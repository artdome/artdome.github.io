<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My iOS Apps</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f7;
            color: #333;
        }
        .header {
            text-align: center;
            padding: 60px 20px 40px;
        }
        .header h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 20px;
            color: #555;
        }
        .projects {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            padding: 0 20px 60px;
        }
        .project {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 300px;
            text-align: center;
        }
        .project img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .project-content {
            padding: 20px;
        }
        .project h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .project p {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }
        .appstore-btn {
            display: inline-block;
        }
        .appstore-btn img {
            width: 150px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>My iOS Projects</h1>
        <p>Discover my mobile applications for iOS</p>
    </div>
    <div class="projects">
        <div class="project">
            <img src="randomizer-screenshot.png" alt="Randomizer App Screenshot">
            <div class="project-content">
                <h2>Randomizer</h2>
                <p>Short description about the Randomizer app</p>
                <a class="appstore-btn" href="https://apps.apple.com/app/idXXXXXXXXX" target="_blank">
                    <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
                </a>
            </div>
        </div>
        <!-- Future projects can be added here -->
    </div>
</body>
</html>
