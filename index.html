<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Developer Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f0f0f;
            --secondary-bg: #1a1a1a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent-start: #6ee7b7;
            --accent-end: #34d399;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --border-radius: 16px;
            --spacing-lg: 40px;
            --spacing-md: 24px;
            --spacing-sm: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary-bg);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-md);
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-lg) 0;
            position: relative;
        }

        .logo {
            width: 60px;
            height: 60px;
        }

        .nav {
            display: flex;
            gap: var(--spacing-md);
        }

        .nav-btn {
            background: var(--card-bg);
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Main Layout */
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-lg);
            min-height: calc(100vh - 140px);
            align-items: center;
        }

        /* Left Column */
        .app-info {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .app-title {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-description {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 500px;
        }

        .cta-button {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            border: none;
            border-radius: var(--border-radius);
            padding: 16px 32px;
            color: var(--primary-bg);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(110, 231, 183, 0.3);
        }

        .screenshots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-sm);
        }

        .screenshot {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            aspect-ratio: 9/16;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .screenshot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Right Column */
        .phone-mockup {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone {
            width: 300px;
            height: 600px;
            background: #000;
            border-radius: 40px;
            position: relative;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .phone::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #000;
            border-radius: 15px;
            z-index: 2;
        }

        .phone-screen {
            position: absolute;
            top: 60px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            background: var(--secondary-bg);
            border-radius: 20px;
            overflow: hidden;
        }

        .phone-screen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--secondary-bg);
            border-radius: var(--border-radius);
            padding: var(--spacing-lg);
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow);
        }

        .modal h2 {
            margin-bottom: var(--spacing-md);
            color: var(--text-primary);
        }

        .modal form {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .modal input,
        .modal textarea {
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-family: inherit;
        }

        .modal button {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            border: none;
            border-radius: 8px;
            padding: 12px;
            color: var(--primary-bg);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal button:hover {
            transform: translateY(-2px);
        }

        .close {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
                gap: var(--spacing-md);
            }

            .app-title {
                font-size: 36px;
            }

            .phone {
                width: 250px;
                height: 500px;
            }

            .screenshots {
                grid-template-columns: repeat(2, 1fr);
            }

            header {
                flex-direction: column;
                gap: var(--spacing-md);
            }

            .nav {
                width: 100%;
                justify-content: center;
            }
        }

        /* Icons */
        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#6ee7b7"/>
                            <stop offset="100%" style="stop-color:#34d399"/>
                        </linearGradient>
                    </defs>
                    <path d="M15 45 L30 10 L45 45 L37.5 45 L35 37.5 L25 37.5 L22.5 45 Z M27.5 32.5 L32.5 32.5 L30 25 Z" fill="url(#logoGradient)"/>
                    <path d="M30 50 Q45 50 45 35 L45 20 Q45 5 30 5 Q15 5 15 20 L15 35 Q15 50 30 50 Z" fill="none" stroke="url(#logoGradient)" stroke-width="3"/>
                </svg>
            </div>
            <nav class="nav">
                <button class="nav-btn" onclick="scrollToSection('apps')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    Apps
                </button>
                <button class="nav-btn" onclick="openModal('privacy')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    Privacy Policy
                </button>
                <button class="nav-btn" onclick="openModal('contact')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    Contact
                </button>
            </nav>
        </header>

        <main class="main" id="apps">
            <div class="app-info">
                <h1 class="app-title">Randomizer</h1>
                <p class="app-description">A sleek iOS app that helps you make random selections with style. Perfect for decisions, games, or just having fun.</p>
                <a href="https://apps.apple.com/app/idXXXXXXXXX" class="cta-button" target="_blank">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    Download on App Store
                </a>
                <div class="screenshots">
                    <div class="screenshot"><img src="randomizer-screenshot1.png" alt="Screenshot 1"></div>
                    <div class="screenshot"><img src="randomizer-screenshot2.png" alt="Screenshot 2"></div>
                    <div class="screenshot"><img src="randomizer-screenshot3.png" alt="Screenshot 3"></div>
                </div>
            </div>
            <div class="phone-mockup">
                <div class="phone">
                    <div class="phone-screen">
                        <img src="randomizer-screenshot1.png" alt="App Mockup">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="privacy-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('privacy')">&times;</span>
            <h2>Privacy Policy</h2>
            <p>Your privacy is important to us. This app does not collect any personal data.</p>
        </div>
    </div>

    <div id="contact-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('contact')">&times;</span>
            <h2>Contact Me</h2>
            <form action="#" method="post">
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" rows="4" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(type) {
            document.getElementById(type + '-modal').style.display = 'flex';
        }

        function closeModal(type) {
            document.getElementById(type + '-modal').style.display = 'none';
        }

        function scrollToSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
